project:
  type: book
  output-dir: docs

book:
  title: "Single-Cell Omics Tutorials"
  subtitle: "End-to-end workflows for multi-omics analysis in R"
  author: "Sarintip Nguantad"
  date: today
  date-format: "MMMM YYYY"
  doi: ""
  repo-url: https://github.com/tipsarin/scOmics
  repo-actions: [edit, issue]
  sharing: [twitter, linkedin]
  search: true
  downloads: [pdf]

  sidebar:
    style: docked
    background: light
    logo: assets/VClabLogo.png

  page-footer:
    left: "© 2026 Sarintip Nguantad"
    right: "Built with [Quarto](https://quarto.org)"

  chapters:
    - index.qmd
    - getting-started.qmd

    - part: "**scRNA-seq**"
      chapters:
        - tutorials/scrna/01-qc-filtering.qmd
        - tutorials/scrna/02-normalization.qmd
        - tutorials/scrna/07-trajectory.qmd

    - part: "**scATAC-seq**"

    - part: "**Spatial Transcriptomics**"

    - part: "**Multi-omics & Genotyping**"
      chapters:
        - tutorials/multiomics/02-signac.qmd

    - references.qmd

format:
  html:
    theme: cosmo 
    css: assets/custom.css
    code-fold: true
    code-tools: true
    code-copy: true
    code-line-numbers: true
    code-block-bg: "#232629"
    smooth-scroll: true
    html-math-method: katex
    include-after-body: assets/fix-codefold.html
    toc: true
    toc-depth: 3
    number-sections: true
    number-depth: 2
    highlight-style: breezedark
    fig-align: center
    fig-width: 8
    fig-height: 6
    link-external-newwindow: true


execute:
  freeze: true
  eval: true
  echo: true
  warning: false
  message: false
  cache: true

knitr:
  opts_knit:
    root.dir: "/home/shared/Git/scOmics/sc-omics-book"
  opts_chunk:
    R.options:
      .libPaths: ["/home/sarintip/R/x86_64-pc-linux-gnu-library/4.5.1"]

bibliography: references.bib
csl: nature.csl
